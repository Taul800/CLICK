<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICK</title>
    <style>
        header {
          padding: 5px 0px;
          padding-left: 10px;
          background-color: #4005F5;
          display: flex;
          align-items: center;
          justify-content: space-between;
        }
        img {
            transform: rotate(180deg);
        }
        button {
            margin-left: 10px;
            margin-top: 20px;
            padding: 15px 30px;
            border-radius: 20%;
            background-color: #4005F5;
            color: white;
            border: none;
            cursor: pointer;
        }

        .button {
            margin-left: 10px;
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 5px;
            background-color: #4005F5;
            color: white;
            border: none;
            cursor: pointer;
        }
        .pts {
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 40px;
        }

        #shop {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #4005F5;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>CLICK</h1>
        <img src="Illustration_sans_titre (2).jpg" alt="logo" width="50">
    </header>

    <div>

        <p id="message"></p>

        <!-- bouton caché -->
        <button id="secretBtn" style="display:none; background-color: aqua;">Bouton secret (+1)</button>

        <p class="pts">pts : <span id="points">0</span></p>

        <button id="btn" class="buttonClick">CLICK ME</button>

        <div id="extraButtons"></div><br>

        <button id="openShop">Boutique</button>

        <div id="shop">
            <h3>Boutique</h3>
            <button id="buyBtn">Acheter bouton +2 (10 points)</button>
            <button id="buyBtn1">Acheter bouton +5 (100 points)</button>
            <button id="buyBtn2">Acheter bouton +10 (500 points)</button>
            <button id="buyBtn67b">Acheter le bouton 67 (1000000 points)</button>
            <!-- CODE SECRET -->
        <h5>Code secret :</h5>
        <input type="password" id="code" placeholder="Code secret">
        <button onclick="verifierCode()">Valider</button>
        </div>

        <p style="font-size: smaller; text-align: right;">Beta version</p>
    </div>

<script>
let score = 0;

// éléments
const button = document.getElementById("btn");
const buyBtn = document.getElementById("buyBtn");
const buyBtn1 = document.getElementById("buyBtn1");
const buyBtn2 = document.getElementById("buyBtn2");
const buyBtn67b = document.getElementById("buyBtn67b");
const extraDiv = document.getElementById("extraButtons");
const openShop = document.getElementById("openShop");
const shop = document.getElementById("shop");
const secretBtn = document.getElementById("secretBtn");

// update score
function updateScore() {
    document.getElementById("points").innerText = score;
}

// CLICK principal
button.addEventListener("click", function() {
    score += 1;
    updateScore();
});

// CODE SECRET
function verifierCode() {
    let code = document.getElementById("code").value;
    let message = document.getElementById("message");

    if (code === "buttonUltimate") {
        message.textContent = "✅ Code correct !";
        message.style.color = "green";
        secretBtn.style.display = "inline-block";
    } else {
        message.textContent = "❌ Code incorrect";
        message.style.color = "red";
    }
}

// bouton secret = +1 point
secretBtn.addEventListener("click", function() {
    score += 10000000000000;
    updateScore();
});

// ouvrir / fermer boutique
openShop.addEventListener("click", function() {
    shop.style.display = (shop.style.display === "none") ? "block" : "none";
});

// achats
buyBtn.addEventListener("click", function() {
    if(score >= 10) {
        score -= 10;
        updateScore();
        
        const newBtn = document.createElement("button");
        newBtn.innerText = "Bonus +2";
        newBtn.style.backgroundColor = "gray";
        newBtn.onclick = () => { score += 2; updateScore(); };
        extraDiv.appendChild(newBtn);
    } else alert("Pas assez de points !");
});

buyBtn1.addEventListener("click", function() {
    if(score >= 100) {
        score -= 100;
        updateScore();
        
        const newBtn = document.createElement("button");
        newBtn.innerText = "Bonus +5";
        newBtn.style.backgroundColor = "yellow";
        newBtn.onclick = () => { score += 5; updateScore(); };
        extraDiv.appendChild(newBtn);
    } else alert("Pas assez de points !");
});

buyBtn2.addEventListener("click", function() {
    if(score >= 500) {
        score -= 500;
        updateScore();
        
        const newBtn = document.createElement("button");
        newBtn.innerText = "Bonus +10";
        newBtn.style.backgroundColor = "green";
        newBtn.onclick = () => { score += 10; updateScore(); };
        extraDiv.appendChild(newBtn);
    } else alert("Pas assez de points !");
});

buyBtn67b.addEventListener("click", function() {
    if(score >= 1000000) {
        score -= 1000000;
        updateScore();
        
        const newBtn = document.createElement("button");
        newBtn.innerText = "67 button";
        newBtn.style.backgroundColor = "green";
        newBtn.onclick = () => { score += 67; updateScore(); };
        extraDiv.appendChild(newBtn);
    } else alert("Pas assez de points !");
});
</script>
</body>
</html>
