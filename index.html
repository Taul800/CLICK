<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLICK</title>
    <style>
        header {
          padding: 5px 0px;
          padding-left: 10px;
          background-color: #4005F5;
          display: flex;
          align-items: center;
          justify-content: space-between;
        }
        img {
            transform: rotate(180deg);
        }
        button {
            margin-left: 10px;
            margin-top: 20px;
            padding: 15px 30px;
            border-radius: 20%;
            background-color: #4005F5;
            color: white;
            border: none;
            cursor: pointer;
        }

        .button {
            margin-left: 10px;
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 5px;
            background-color: #4005F5;
            color: white;
            border: none;
            cursor: pointer;
        }
        .pts {
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 40px;
        }

        /* BOUTIQUE */
        #shop {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #4005F5;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>CLICK</h1>
        <img src="Illustration_sans_titre (2).jpg" alt="logo" width="50">
    </header>

    <div>
        <p class="pts">pts : <span id="points">0</span></p>

        <button id="btn" class="buttonClick">CLICK ME</button>

        <div id="extraButtons"></div><br>

        <!-- bouton pour ouvrir la boutique -->
        <button id="openShop" class="button">Boutique</button>

        <!-- BOUTIQUE -->
        <div id="shop">
            <h3>Boutique</h3>
            <button id="buyBtn">Acheter bouton +2 (10 points)</button>
            <button id="buyBtn1">Acheter bouton +5 (100 points)</button>
        </div>

        <p style="font-size: smaller; text-align: right;">Beta version</p>
    </div>

<script>
let score = 0;

// éléments
const button = document.getElementById("btn");
const buyBtn = document.getElementById("buyBtn");
const buyBtn1 = document.getElementById("buyBtn1");
const extraDiv = document.getElementById("extraButtons");
const openShop = document.getElementById("openShop");
const shop = document.getElementById("shop");

// update score
function updateScore() {
    document.getElementById("points").innerText = score;
}

// CLICK principal
button.addEventListener("click", function() {
    score += 100;
    updateScore();
});

// ouvrir / fermer boutique
openShop.addEventListener("click", function() {
    if (shop.style.display === "none") {
        shop.style.display = "block";
    } else {
        shop.style.display = "none";
    }
});

// achat bouton
buyBtn.addEventListener("click", function() {
    if(score >= 10) {
        score -= 10;
        updateScore();
        
        const newBtn = document.createElement("button");
        newBtn.innerText = "Bonus +2";
        newBtn.style.backgroundColor = "gray";
        newBtn.addEventListener("click", function() {
            score += 2;
            updateScore();
        });
        extraDiv.appendChild(newBtn);
    } else {
        alert("Pas assez de points !");
    }
});

buyBtn1.addEventListener("click", function() {
    if(score >= 100) {
        score -= 100;
        updateScore();
        
        const newBtn = document.createElement("button");
        newBtn.innerText = "Bonus +5";
        newBtn.style.backgroundColor = "yellow";
        newBtn.addEventListener("click", function() {
            score += 5;
            updateScore();
        });
        extraDiv.appendChild(newBtn);
    } else {
        alert("Pas assez de points !");
    }
});
</script>
</body>
</html>
